<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Floating Companion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: transparent;
      -webkit-app-region: drag;
      overflow: hidden;
    }
    .container {
      width: 260px;
      background: #FEFCF8;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      overflow: hidden;
    }
    .header {
      padding: 16px;
      background: #F5C842;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .title {
      font-family: Georgia, serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #1A1714;
    }
    .minimize {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #1A1714;
      -webkit-app-region: no-drag;
    }
    .content {
      padding: 16px;
    }
    textarea {
      width: 100%;
      height: 100px;
      border: none;
      background: #F5F2EC;
      border-radius: 10px;
      padding: 12px;
      font-family: Georgia, serif;
      font-size: 1rem;
      resize: none;
      outline: none;
      -webkit-app-region: no-drag;
    }
    textarea:focus {
      box-shadow: 0 0 0 2px #C0452A;
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .save {
      background: #C0452A;
      color: white;
    }
    .clear {
      background: #F5F2EC;
      color: #1A1714;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="title">Quick Note</span>
      <button class="minimize" id="minimizeBtn">−</button>
    </div>
    <div class="content">
      <textarea id="noteInput" placeholder="Write something..."></textarea>
      <div class="buttons">
        <button class="clear" id="clearBtn">Clear</button>
        <button class="save" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <script>
    const noteInput = document.getElementById('noteInput');
    const saveBtn = document.getElementById('saveBtn');
    const clearBtn = document.getElementById('clearBtn');
    const minimizeBtn = document.getElementById('minimizeBtn');

    minimizeBtn.addEventListener('click', () => {
      window.api.window.hideFloating();
    });

    clearBtn.addEventListener('click', () => {
      noteInput.value = '';
      noteInput.focus();
    });

    saveBtn.addEventListener('click', async () => {
      const content = noteInput.value.trim();
      if (!content) return;
      await window.api.notes.create(content, 'quick', '#F5C842');
      noteInput.value = '';
    });

    noteInput.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        saveBtn.click();
      }
    });
  </script>
</body>
</html>
